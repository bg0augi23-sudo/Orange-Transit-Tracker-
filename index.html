<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Olentangy Transit Tracker</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; margin-bottom: 20px; }
        .status-box { padding: 15px; border-radius: 5px; color: white; font-weight: bold; margin-top: 15px; }
        .delayed { background-color: #e74c3c; } /* Red for delays */
        .on-time { background-color: #2ecc71; } /* Green for on time */
        select, button { width: 100%; padding: 10px; margin-top: 10px; border-radius: 5px; border: 1px solid #ccc; font-size: 16px; }
        button { background-color: #3498db; color: white; cursor: pointer; border: none; font-weight: bold; }
    </style>
</head>
<body>

    <div class="card">
        <h2>Transit Tracker</h2>
        <select id="district"><option>Olentangy Local Schools</option></select>
        <select id="school"><option>Olentangy Orange High School</option></select>
        <select id="bus"><option>Bus 14</option><option>Bus 22</option></select>
        <button onclick="alert('Bus tracking active!')">Track Bus</button>
    </div>

    <div class="card">
        <h3>Olentangy Orange HS — Bus 14</h3>
        <div class="status-box delayed">
            <p style="font-size: 24px; margin: 0;">ETA: 7:18 AM</p>
            <p style="margin: 5px 0 0 0;">Status: Delayed (8 Mins)</p>
        </div>
        <p style="font-size: 12px; color: #7f8c8d; margin-top: 15px;">Last updated: 7:10 AM</p>
    </div>
<div class="card" style="background: #eee;">
        <h4>Developer Sandbox Contoller</h4>
        <button onclick="triggerDelay()" style="background-color: #e67e22;">Simulate 10-Min Delay</button>
        <button onclick="resetBus()" style="background-color: #27ae60;">Reset to On-Time</button>
    </div>

    <script>
        // 1. This is your Data Schema from your blueprint
        let busData = {
            "district_id": "Olentangy Local Schools",
            "school_id": "Olentangy Orange High School",
            "bus_number": 14,
            "route_status": "On Time", 
            "minutes_delayed": 0,
            "estimated_arrival_time": "7:10 AM",
            "last_updated": "1:15 PM"
        };

        // 2. Function to update what the user sees on the screen
        function updateUI() {
            const statusBox = document.getElementById('status-box-element');
            const etaText = document.getElementById('eta-text');
            const statusText = document.getElementById('status-text');
            
            etaText.innerText = "ETA: " + busData.estimated_arrival_time;
            
            if (busData.route_status === "Delayed") {
                statusBox.className = "status-box delayed";
                statusText.innerText = "Status: Delayed (" + busData.minutes_delayed + " Mins)";
            } else {
                statusBox.className = "status-box on-time";
                statusText.innerText = "Status: On Time";
            }
        }

        // 3. Functions to simulate data changes
        function triggerDelay() {
            busData.route_status = "Delayed";
            busData.minutes_delayed = 10;
            busData.estimated_arrival_time = "7:20 AM";
            updateUI();
        }

        function resetBus() {
            busData.route_status = "On Time";
            busData.minutes_delayed = 0;
            busData.estimated_arrival_time = "7:10 AM";
            updateUI();
        }
    </script>
</body>
</html>
